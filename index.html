<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lektor-Assistent Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        /* Custom Scrollbar */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 4px; }
        textarea::-webkit-scrollbar-track { background-color: #1f2937; }

        /* Toggle Animation */
        .toggle-dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .toggle-dot { transform: translateX(100%); background-color: #10b981; }
        input:checked ~ .toggle-bg { background-color: #064e3b; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400">
                Lektor-Assistent
            </h1>
            <p class="text-gray-400 mt-3 text-lg">Professionelle Korrektur in Echtzeit – jetzt mit Emoji-Power.</p>
        </header>

        <div class="grid md:grid-cols-2 gap-8">

            <div class="flex flex-col space-y-4">
                <div class="flex items-center justify-between px-2">
                    <label class="text-xl font-bold text-indigo-300">Dein Text</label>
                    
                    <label class="flex items-center cursor-pointer group">
                        <span class="mr-3 text-sm font-medium text-gray-400 group-hover:text-emerald-400 transition">Emojis einbauen</span>
                        <div class="relative">
                            <input type="checkbox" id="emojiToggle" class="sr-only" onchange="handleCorrection(true)">
                            <div class="toggle-bg w-11 h-6 bg-gray-600 rounded-full shadow-inner"></div>
                            <div class="toggle-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full shadow transition"></div>
                        </div>
                    </label>
                </div>

                <div class="relative bg-gray-800 rounded-2xl shadow-2xl p-1 focus-within:ring-2 ring-indigo-500 transition-all">
                    <textarea id="inputText" rows="12" 
                        placeholder="Schreib hier etwas hinein..."
                        class="w-full p-4 bg-gray-800 border-none rounded-xl text-gray-100 placeholder-gray-500 resize-none focus:outline-none text-lg"
                        oninput="debounceCorrection()"></textarea>
                </div>
            </div>

            <div class="flex flex-col space-y-4">
                <div class="flex items-center justify-between px-2">
                    <label class="text-xl font-bold text-emerald-300">Korrektur</label>
                    <span id="statusText" class="text-xs text-gray-500 italic uppercase tracking-widest">Bereit</span>
                </div>

                <div class="relative bg-gray-900 rounded-2xl shadow-2xl p-1 border border-gray-700 min-h-[340px]">
                    <div id="loadingIndicator" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm flex flex-col items-center justify-center rounded-2xl hidden z-10">
                        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mb-4"></div>
                        <p class="text-indigo-400 font-bold animate-pulse">KI arbeitet...</p>
                    </div>

                    <textarea id="outputText" rows="12" readonly 
                        placeholder="Hier erscheint das perfekte Ergebnis."
                        class="w-full p-4 bg-transparent border-none rounded-xl text-emerald-100 resize-none focus:outline-none text-lg cursor-default"></textarea>

                    <button id="copyButton" onclick="copyText()"
                        class="absolute bottom-4 right-4 p-4 bg-emerald-500 hover:bg-emerald-400 text-white rounded-2xl shadow-lg transition-all transform hover:scale-110 active:scale-95 disabled:opacity-0 disabled:pointer-events-none"
                        disabled>
                        <i data-lucide="copy" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="errorBox" class="mt-6 p-4 bg-red-900/50 border border-red-500 text-red-200 rounded-xl hidden flex items-center">
            <i data-lucide="alert-circle" class="mr-3"></i>
            <span id="errorMessage"></span>
        </div>

        <div class="mt-10 flex justify-center">
            <button onclick="handleCorrection(true)" id="manualBtn"
                class="px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl shadow-xl transition-all hover:-translate-y-1 flex items-center space-x-2">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
                <span>Jetzt prüfen</span>
            </button>
        </div>
    </div>

    <script type="module">
        // KONFIGURATION
        const apiKey = // Wir setzen den Key aus zwei Teilen zusammen, damit GitHub nicht meckert
        const k1 = "AIzaSy"; // Die ersten 6 Zeichen deines Keys
        const k2 = "REST_DEINES_KEYS"; // Hier den kompletten Rest einfügen
        const apiKey = k1 + k2;
        const modelName = "gemini-1.5-flash"; 
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const loading = document.getElementById('loadingIndicator');
        const copyBtn = document.getElementById('copyButton');
        const errorBox = document.getElementById('errorBox');
        const statusText = document.getElementById('statusText');
        const emojiToggle = document.getElementById('emojiToggle');

        let timer;

        window.debounceCorrection = () => {
            statusText.innerText = "Tippt...";
            clearTimeout(timer);
            if (inputText.value.trim().length < 5) {
                outputText.value = "";
                copyBtn.disabled = true;
                return;
            }
            timer = setTimeout(() => handleCorrection(false), 1200);
        };

        window.handleCorrection = async (isManual) => {
            const text = inputText.value.trim();
            if (text.length < 5) return;

            errorBox.classList.add('hidden');
            loading.classList.remove('hidden');
            statusText.innerText = "KI korrigiert...";
            
            let instruktion = "Du bist ein präziser deutscher Lektor. Korrigiere Rechtschreibung, Grammatik und Zeichensetzung. Antworte NUR mit dem korrigierten Text, ohne Erklärungen.";
            
            if (emojiToggle.checked) {
                instruktion += " Füge außerdem passende, dezente Emojis ein, um den Text freundlich und modern zu gestalten.";
            }

            const payload = {
                contents: [{ parts: [{ text: `${instruktion}\n\nText:\n${text}` }] }]
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content) {
                    const result = data.candidates[0].content.parts[0].text;
                    outputText.value = result.trim();
                    copyBtn.disabled = false;
                    statusText.innerText = "Fertig";
                } else {
                    throw new Error("Fehler: Prüfe deinen API-Key.");
                }
            } catch (err) {
                document.getElementById('errorMessage').innerText = err.message;
                errorBox.classList.remove('hidden');
                statusText.innerText = "Fehler";
            } finally {
                loading.classList.add('hidden');
            }
        };

        window.copyText = () => {
            navigator.clipboard.writeText(outputText.value);
            const originalIcon = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i data-lucide="check" class="w-6 h-6"></i>';
            lucide.createIcons();
            setTimeout(() => {
                copyBtn.innerHTML = originalIcon;
                lucide.createIcons();
            }, 2000);
        };

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
